version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: englishflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  languagetool:
    image: erikvl87/languagetool
    restart: unless-stopped
    ports:
      - '8010:8010'
    environment:
      - Java_Xms=512m
      - Java_Xmx=1g
    # Optional: enable n-gram data for better grammar detection
    # volumes:
    #   - languagetool_ngrams:/ngrams
    # command: --config /LanguageTool/languagetool.cfg

volumes:
  postgres_data:
